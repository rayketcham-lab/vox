name: CI

on:
  push:
    branches: [master, main]
    tags: ["v*"]
  pull_request:
    branches: [master, main]

jobs:
  # -----------------------------------------------------------------------
  # GitHub-hosted (free for public repos)
  # -----------------------------------------------------------------------
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install ruff
      - name: Lint
        run: ruff check src/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package with dev dependencies
        run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest tests/ -v

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for secrets (TruffleHog)
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  safety-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Block .env files
        run: |
          if find . -name '.env' -not -name '.env.example' | grep -q .; then
            echo "::error::BLOCKED — .env file detected in commit! Never commit secrets."
            exit 1
          fi
      - name: Block private keys and certificates
        run: |
          FOUND=$(find . -type f \( -name '*.pem' -o -name '*.key' -o -name '*.p12' -o -name '*.pfx' \) | head -5)
          if [ -n "$FOUND" ]; then
            echo "::error::BLOCKED — Private key/cert files detected: $FOUND"
            exit 1
          fi
      - name: Scan for hardcoded secrets patterns
        run: |
          # Check for common secret patterns in Python files
          PATTERNS='(password|secret|api_key|token|credential)\s*=\s*["\x27][^"\x27]{8,}'
          if grep -rEi "$PATTERNS" src/ --include='*.py' | grep -v 'os.environ' | grep -v '.get(' | grep -v 'example' | grep -v '#'; then
            echo "::error::BLOCKED — Possible hardcoded secret found in source code!"
            exit 1
          fi
          echo "No hardcoded secrets detected."
      - name: Scan for IP addresses and hostnames
        run: |
          # Check for hardcoded internal IPs (192.168.x.x, 10.x.x.x, 172.16-31.x.x)
          if grep -rEn '(192\.168\.[0-9]+\.[0-9]+|10\.[0-9]+\.[0-9]+\.[0-9]+|172\.(1[6-9]|2[0-9]|3[01])\.[0-9]+\.[0-9]+)' src/ --include='*.py' | grep -v '127.0.0.1' | grep -v '#'; then
            echo "::error::BLOCKED — Internal IP address found in source code!"
            exit 1
          fi
          echo "No internal IPs detected."

  # -----------------------------------------------------------------------
  # Self-hosted runners (GPU / integration tests)
  #
  # These jobs run on your three self-hosted machines. Register them at:
  #   GitHub repo > Settings > Actions > Runners > New self-hosted runner
  #
  # Label your runners:
  #   - gpu-rtx3090   → the RTX 3090 dev box (CUDA tests, model loading)
  #   - runner-linux  → Linux build/test server
  #   - runner-win    → Windows build/test server
  #
  # Jobs skip gracefully if no matching runner is online.
  # -----------------------------------------------------------------------
  test-gpu:
    if: github.event_name == 'push'
    runs-on: [self-hosted, gpu-rtx3090]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Install package
        run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest tests/ -v
      - name: Verify Ollama is reachable
        run: |
          curl -sf http://127.0.0.1:11434/api/tags || echo "::warning::Ollama not running on this runner"
      - name: Verify CUDA available
        run: |
          python -c "import torch; assert torch.cuda.is_available(), 'CUDA not available'; print(f'GPU: {torch.cuda.get_device_name(0)}')" || echo "::warning::CUDA not available"

  test-linux:
    if: github.event_name == 'push'
    runs-on: [self-hosted, runner-linux]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Install package
        run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest tests/ -v

  test-windows:
    if: github.event_name == 'push'
    runs-on: [self-hosted, runner-win]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Install package
        run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest tests/ -v
