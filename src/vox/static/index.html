<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>VOX</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%231a1a2e'/%3E%3Ctext x='32' y='44' font-family='system-ui,sans-serif' font-size='28' font-weight='bold' fill='%236c63ff' text-anchor='middle'%3EVOX%3C/text%3E%3C/svg%3E">
<style>
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --bg: #1a1a2e;
  --bg-light: #16213e;
  --bg-bubble-vox: #2a2a3e;
  --bg-bubble-user: #6c63ff;
  --text: #e0e0e0;
  --text-dim: #888;
  --accent: #6c63ff;
  --accent-hover: #5a52d5;
  --danger: #ff4444;
  --success: #44cc66;
  --radius: 16px;
  --header-h: 56px;
  --footer-h: 64px;
}

html, body {
  height: 100%;
  height: 100dvh;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  font-size: 16px;
  line-height: 1.5;
  overflow: hidden;
  -webkit-text-size-adjust: 100%;
}

/* ── Header ── */
.header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: var(--header-h);
  background: var(--bg-light);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  z-index: 100;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}

.header-title {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 2px;
  color: var(--accent);
}

.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--danger);
  display: inline-block;
  margin-left: 8px;
  transition: background 0.3s;
}

.status-dot.connected {
  background: var(--success);
}

.hamburger {
  background: none;
  border: none;
  color: var(--text);
  font-size: 24px;
  cursor: pointer;
  padding: 8px;
  line-height: 1;
}

/* ── Menu ── */
.menu-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 200;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}

.menu-overlay.open {
  opacity: 1;
  pointer-events: auto;
}

.menu-panel {
  position: fixed;
  top: 0;
  right: 0;
  width: 260px;
  max-width: 80vw;
  height: 100%;
  height: 100dvh;
  background: var(--bg-light);
  z-index: 201;
  transform: translateX(100%);
  transition: transform 0.25s ease;
  display: flex;
  flex-direction: column;
  padding: 20px 0;
}

.menu-overlay.open .menu-panel {
  transform: translateX(0);
}

.menu-item {
  padding: 14px 24px;
  font-size: 16px;
  color: var(--text);
  cursor: pointer;
  border: none;
  background: none;
  text-align: left;
  width: 100%;
  font-family: inherit;
  transition: background 0.15s;
}

.menu-item:hover, .menu-item:active {
  background: rgba(108,99,255,0.15);
}

/* ── Chat ── */
.chat-container {
  position: fixed;
  top: var(--header-h);
  bottom: var(--footer-h);
  left: 0;
  right: 0;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  padding: 16px;
}

.chat-container.hidden {
  display: none;
}

.message {
  display: flex;
  margin-bottom: 12px;
  animation: fadeIn 0.2s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

.message.user {
  justify-content: flex-end;
}

.message.vox {
  justify-content: flex-start;
}

.bubble {
  max-width: 80%;
  padding: 10px 14px;
  border-radius: var(--radius);
  word-wrap: break-word;
  overflow-wrap: break-word;
  white-space: pre-wrap;
  font-size: 15px;
  line-height: 1.45;
}

.message.user .bubble {
  background: var(--bg-bubble-user);
  color: #fff;
  border-bottom-right-radius: 4px;
}

.message.vox .bubble {
  background: var(--bg-bubble-vox);
  color: var(--text);
  border-bottom-left-radius: 4px;
}

.bubble img {
  max-width: 100%;
  border-radius: 8px;
  margin-top: 6px;
  cursor: pointer;
  display: block;
}

/* ── Typing indicator ── */
.typing-indicator {
  display: none;
  justify-content: flex-start;
  margin-bottom: 12px;
}

.typing-indicator.visible {
  display: flex;
}

.typing-dots {
  background: var(--bg-bubble-vox);
  border-radius: var(--radius);
  border-bottom-left-radius: 4px;
  padding: 12px 16px;
  display: flex;
  gap: 5px;
  align-items: center;
}

.typing-dots span {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--text-dim);
  animation: bounce 1.2s infinite;
}

.typing-dots span:nth-child(2) { animation-delay: 0.15s; }
.typing-dots span:nth-child(3) { animation-delay: 0.3s; }

@keyframes bounce {
  0%, 60%, 100% { transform: translateY(0); }
  30% { transform: translateY(-6px); }
}

/* ── Toast ── */
.toast {
  position: fixed;
  top: calc(var(--header-h) + 12px);
  left: 50%;
  transform: translateX(-50%) translateY(-80px);
  background: var(--bg-bubble-vox);
  color: var(--text);
  padding: 10px 20px;
  border-radius: 8px;
  font-size: 14px;
  z-index: 150;
  transition: transform 0.3s ease;
  pointer-events: none;
  border: 1px solid rgba(255,255,255,0.08);
}

.toast.visible {
  transform: translateX(-50%) translateY(0);
}

/* ── Footer / Input ── */
.footer {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: var(--footer-h);
  background: var(--bg-light);
  display: flex;
  align-items: center;
  padding: 0 12px;
  gap: 10px;
  border-top: 1px solid rgba(255,255,255,0.06);
  z-index: 100;
}

.footer.hidden {
  display: none;
}

.input-wrap {
  flex: 1;
  display: flex;
}

#msgInput {
  flex: 1;
  background: var(--bg);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 22px;
  padding: 10px 16px;
  color: var(--text);
  font-size: 15px;
  font-family: inherit;
  resize: none;
  outline: none;
  max-height: 120px;
  line-height: 1.4;
  transition: border-color 0.2s;
}

#msgInput:focus {
  border-color: var(--accent);
}

#msgInput::placeholder {
  color: var(--text-dim);
}

#msgInput:disabled {
  opacity: 0.5;
}

#sendBtn {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  background: var(--accent);
  border: none;
  color: #fff;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background 0.15s, opacity 0.15s;
}

#sendBtn:hover { background: var(--accent-hover); }
#sendBtn:disabled { opacity: 0.4; cursor: default; }

#uploadBtn {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  background: transparent;
  border: 1px solid rgba(255,255,255,0.15);
  color: var(--text-dim);
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: border-color 0.15s, color 0.15s;
}

#uploadBtn:hover { border-color: var(--accent); color: var(--accent); }
#uploadBtn.has-images { border-color: var(--accent); color: var(--accent); background: rgba(108,99,255,0.15); }

.image-preview-strip {
  position: fixed;
  bottom: var(--footer-h);
  left: 0;
  right: 0;
  display: none;
  gap: 8px;
  padding: 8px 12px;
  background: var(--bg-light);
  border-top: 1px solid rgba(255,255,255,0.06);
  overflow-x: auto;
  z-index: 99;
}

.image-preview-strip.visible {
  display: flex;
}

.preview-thumb {
  position: relative;
  flex-shrink: 0;
}

.preview-thumb img {
  width: 60px;
  height: 60px;
  object-fit: cover;
  border-radius: 8px;
  border: 2px solid var(--accent);
}

.preview-thumb .remove-thumb {
  position: absolute;
  top: -6px;
  right: -6px;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: var(--danger);
  color: #fff;
  border: none;
  font-size: 12px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  line-height: 1;
}

/* ── Lightbox ── */
.lightbox {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  z-index: 300;
  display: none;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  touch-action: pinch-zoom;
}

.lightbox.open {
  display: flex;
}

.lightbox img {
  max-width: 95vw;
  max-height: 85vh;
  border-radius: 4px;
  object-fit: contain;
  touch-action: pinch-zoom;
}

.lightbox-close {
  position: absolute;
  top: 16px;
  right: 16px;
  background: none;
  border: none;
  color: #fff;
  font-size: 32px;
  cursor: pointer;
  z-index: 301;
  width: 44px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ── Gallery ── */
.gallery-container {
  position: fixed;
  top: var(--header-h);
  bottom: 0;
  left: 0;
  right: 0;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 16px;
  display: none;
}

.gallery-container.visible {
  display: block;
}

.gallery-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}

.gallery-header h2 {
  font-size: 20px;
  font-weight: 600;
}

.gallery-back {
  background: var(--accent);
  color: #fff;
  border: none;
  padding: 8px 16px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  font-family: inherit;
}

.gallery-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 10px;
}

.gallery-item {
  position: relative;
}

.gallery-item img {
  width: 100%;
  aspect-ratio: 1;
  object-fit: cover;
  border-radius: 8px;
  cursor: pointer;
  transition: transform 0.15s;
  display: block;
}

.gallery-item img:hover {
  transform: scale(1.03);
}

.gallery-delete {
  position: absolute;
  top: 6px;
  right: 6px;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: rgba(0,0,0,0.7);
  color: var(--danger);
  border: none;
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.15s;
  z-index: 2;
}

.gallery-item:hover .gallery-delete {
  opacity: 1;
}

.gallery-empty {
  text-align: center;
  color: var(--text-dim);
  padding: 40px 0;
}

/* ── Desktop ── */
@media (min-width: 720px) {
  .chat-container, .gallery-container {
    max-width: 720px;
    margin: 0 auto;
    left: 0;
    right: 0;
  }

  .footer {
    max-width: 720px;
    margin: 0 auto;
    left: 0;
    right: 0;
  }

  .bubble {
    max-width: 65%;
  }
}
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div style="display:flex;align-items:center;">
    <span class="header-title">VOX</span>
    <span class="status-dot" id="statusDot" title="Disconnected"></span>
  </div>
  <button class="hamburger" id="menuBtn" aria-label="Menu">&#9776;</button>
</header>

<!-- Menu overlay -->
<div class="menu-overlay" id="menuOverlay">
  <div class="menu-panel">
    <button class="menu-item" id="menuNewChat">New Chat</button>
    <button class="menu-item" id="menuGallery">Image Gallery</button>
    <button class="menu-item" id="menuAbout">About VOX</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Chat -->
<div class="chat-container" id="chatContainer">
  <div class="typing-indicator" id="typingIndicator">
    <div class="typing-dots"><span></span><span></span><span></span></div>
  </div>
</div>

<!-- Gallery -->
<div class="gallery-container" id="galleryContainer">
  <div class="gallery-header">
    <h2>Image Gallery</h2>
    <button class="gallery-back" id="galleryBack">Back to Chat</button>
  </div>
  <div class="gallery-grid" id="galleryGrid"></div>
</div>

<!-- Footer -->
<div class="footer" id="footer">
  <input type="file" id="fileInput" accept="image/*" multiple style="display:none">
  <button id="uploadBtn" aria-label="Upload image" title="Upload image">&#128206;</button>
  <div class="input-wrap">
    <textarea id="msgInput" rows="1" placeholder="Message VOX..." autocomplete="off"></textarea>
  </div>
  <button id="sendBtn" aria-label="Send">&#9654;</button>
</div>

<!-- Image preview strip -->
<div class="image-preview-strip" id="imagePreviewStrip"></div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightboxClose">&times;</button>
  <img id="lightboxImg" src="" alt="Full size">
</div>

<script>
(function() {
  "use strict";

  // ── DOM refs ──
  var chatContainer = document.getElementById("chatContainer");
  var typingIndicator = document.getElementById("typingIndicator");
  var msgInput = document.getElementById("msgInput");
  var sendBtn = document.getElementById("sendBtn");
  var footer = document.getElementById("footer");
  var statusDot = document.getElementById("statusDot");
  var toast = document.getElementById("toast");
  var menuBtn = document.getElementById("menuBtn");
  var menuOverlay = document.getElementById("menuOverlay");
  var menuNewChat = document.getElementById("menuNewChat");
  var menuGallery = document.getElementById("menuGallery");
  var menuAbout = document.getElementById("menuAbout");
  var galleryContainer = document.getElementById("galleryContainer");
  var galleryGrid = document.getElementById("galleryGrid");
  var galleryBack = document.getElementById("galleryBack");
  var lightbox = document.getElementById("lightbox");
  var lightboxImg = document.getElementById("lightboxImg");
  var lightboxClose = document.getElementById("lightboxClose");

  var fileInput = document.getElementById("fileInput");
  var uploadBtn = document.getElementById("uploadBtn");
  var imagePreviewStrip = document.getElementById("imagePreviewStrip");

  // ── State ──
  var ws = null;
  var sessionId = null;
  var processing = false;
  var currentVoxBubble = null;
  var reconnectTimer = null;
  var messageQueue = [];
  var toastTimer = null;
  var pendingImages = []; // base64 strings ready to send

  // ── Helpers ──
  function clearChildren(el) {
    while (el.firstChild) {
      el.removeChild(el.firstChild);
    }
  }

  function createGalleryEmpty(text) {
    var div = document.createElement("div");
    div.className = "gallery-empty";
    div.textContent = text;
    return div;
  }

  // ── WebSocket ──
  function connect() {
    var proto = location.protocol === "https:" ? "wss:" : "ws:";
    ws = new WebSocket(proto + "//" + location.host + "/ws/chat");

    ws.onopen = function() {
      statusDot.classList.add("connected");
      statusDot.title = "Connected";
      while (messageQueue.length > 0) {
        ws.send(messageQueue.shift());
      }
    };

    ws.onclose = function() {
      statusDot.classList.remove("connected");
      statusDot.title = "Disconnected";
      ws = null;
      reconnectTimer = setTimeout(connect, 2000);
    };

    ws.onerror = function() {
      // onclose fires after this
    };

    ws.onmessage = function(ev) {
      var msg;
      try { msg = JSON.parse(ev.data); } catch(e) { return; }
      handleMessage(msg);
    };
  }

  function handleMessage(msg) {
    switch (msg.type) {
      case "session":
        sessionId = msg.id;
        break;

      case "chunk":
        hideTyping();
        if (!currentVoxBubble) {
          currentVoxBubble = addBubble("vox", "");
        }
        currentVoxBubble.textContent += msg.text;
        scrollToBottom();
        break;

      case "image":
        hideTyping();
        if (!currentVoxBubble) {
          currentVoxBubble = addBubble("vox", "");
        }
        var img = document.createElement("img");
        img.src = msg.url;
        img.alt = msg.filename || "Image";
        img.addEventListener("click", function() { openLightbox(msg.url); });
        currentVoxBubble.appendChild(img);
        scrollToBottom();
        break;

      case "done":
        hideTyping();
        currentVoxBubble = null;
        setProcessing(false);
        break;

      case "busy":
        showToast("VOX is still processing...");
        break;
    }
  }

  // ── Chat bubbles ──
  function addBubble(role, text) {
    var wrapper = document.createElement("div");
    wrapper.className = "message " + role;
    var bubble = document.createElement("div");
    bubble.className = "bubble";
    if (text) bubble.textContent = text;
    wrapper.appendChild(bubble);
    chatContainer.insertBefore(wrapper, typingIndicator);
    scrollToBottom();
    return bubble;
  }

  // ── Typing indicator ──
  function showTyping() {
    typingIndicator.classList.add("visible");
    scrollToBottom();
  }

  function hideTyping() {
    typingIndicator.classList.remove("visible");
  }

  // ── Processing state ──
  function setProcessing(state) {
    processing = state;
    msgInput.disabled = state;
    sendBtn.disabled = state;
    if (!state) {
      msgInput.focus();
    }
  }

  // ── Image upload ──
  uploadBtn.addEventListener("click", function() {
    fileInput.click();
  });

  fileInput.addEventListener("change", function() {
    var files = fileInput.files;
    if (!files.length) return;
    for (var i = 0; i < files.length; i++) {
      (function(file) {
        var reader = new FileReader();
        reader.onload = function(e) {
          pendingImages.push(e.target.result); // data:image/...;base64,...
          updatePreviewStrip();
        };
        reader.readAsDataURL(file);
      })(files[i]);
    }
    fileInput.value = "";
  });

  function updatePreviewStrip() {
    while (imagePreviewStrip.firstChild) {
      imagePreviewStrip.removeChild(imagePreviewStrip.firstChild);
    }
    if (pendingImages.length === 0) {
      imagePreviewStrip.classList.remove("visible");
      uploadBtn.classList.remove("has-images");
      return;
    }
    imagePreviewStrip.classList.add("visible");
    uploadBtn.classList.add("has-images");
    pendingImages.forEach(function(dataUrl, idx) {
      var thumb = document.createElement("div");
      thumb.className = "preview-thumb";
      var img = document.createElement("img");
      img.src = dataUrl;
      img.alt = "Upload " + (idx + 1);
      var removeBtn = document.createElement("button");
      removeBtn.className = "remove-thumb";
      removeBtn.textContent = "\u00D7";
      removeBtn.addEventListener("click", function() {
        pendingImages.splice(idx, 1);
        updatePreviewStrip();
      });
      thumb.appendChild(img);
      thumb.appendChild(removeBtn);
      imagePreviewStrip.appendChild(thumb);
    });
  }

  // ── Send message ──
  function send() {
    var text = msgInput.value.trim();
    if ((!text && pendingImages.length === 0) || processing) return;

    // Show user bubble — with uploaded image thumbnails if any
    var userBubble = addBubble("user", text);
    if (pendingImages.length > 0) {
      pendingImages.forEach(function(dataUrl) {
        var img = document.createElement("img");
        img.src = dataUrl;
        img.alt = "Uploaded image";
        img.style.maxWidth = "200px";
        img.style.borderRadius = "8px";
        img.style.marginTop = "6px";
        img.style.display = "block";
        img.addEventListener("click", function() { openLightbox(dataUrl); });
        userBubble.appendChild(img);
      });
    }

    msgInput.value = "";
    autoResize();
    setProcessing(true);
    showTyping();

    var msg = { type: "message", text: text || "What's in this image?" };
    if (pendingImages.length > 0) {
      msg.images = pendingImages.slice(); // copy
    }

    var payload = JSON.stringify(msg);
    pendingImages = [];
    updatePreviewStrip();

    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(payload);
    } else {
      messageQueue.push(payload);
    }
  }

  sendBtn.addEventListener("click", send);

  msgInput.addEventListener("keydown", function(e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });

  // ── Auto-resize textarea ──
  function autoResize() {
    msgInput.style.height = "auto";
    msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + "px";
    // Adjust chat container when preview strip is visible
    var extra = imagePreviewStrip.classList.contains("visible") ? 76 : 0;
    chatContainer.style.bottom = "calc(var(--footer-h) + " + extra + "px)";
  }

  msgInput.addEventListener("input", autoResize);

  // ── Scroll ──
  function scrollToBottom() {
    requestAnimationFrame(function() {
      chatContainer.scrollTop = chatContainer.scrollHeight;
    });
  }

  // ── Toast ──
  function showToast(text) {
    toast.textContent = text;
    toast.classList.add("visible");
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(function() {
      toast.classList.remove("visible");
    }, 2500);
  }

  // ── Menu ──
  menuBtn.addEventListener("click", function() {
    menuOverlay.classList.add("open");
  });

  menuOverlay.addEventListener("click", function(e) {
    if (e.target === menuOverlay) {
      menuOverlay.classList.remove("open");
    }
  });

  function closeMenu() {
    menuOverlay.classList.remove("open");
  }

  menuNewChat.addEventListener("click", function() {
    closeMenu();
    var msgs = chatContainer.querySelectorAll(".message");
    msgs.forEach(function(m) { m.remove(); });
    currentVoxBubble = null;
    setProcessing(false);
    hideTyping();
  });

  menuGallery.addEventListener("click", function() {
    closeMenu();
    showGallery();
  });

  menuAbout.addEventListener("click", function() {
    closeMenu();
    showToast("VOX -- Voice Operated eXecutive");
  });

  // ── Gallery ──
  function showGallery() {
    chatContainer.classList.add("hidden");
    footer.classList.add("hidden");
    galleryContainer.classList.add("visible");

    clearChildren(galleryGrid);

    fetch("/api/images")
      .then(function(r) { return r.json(); })
      .then(function(images) {
        if (!images || images.length === 0) {
          galleryGrid.appendChild(createGalleryEmpty("No images yet"));
          return;
        }
        images.forEach(function(item) {
          var wrapper = document.createElement("div");
          wrapper.className = "gallery-item";

          var el = document.createElement("img");
          el.src = item.url || item;
          el.alt = item.filename || "Image";
          el.loading = "lazy";
          el.addEventListener("click", function() {
            openLightbox(el.src);
          });

          var delBtn = document.createElement("button");
          delBtn.className = "gallery-delete";
          delBtn.textContent = "\u00D7";
          delBtn.title = "Delete image";
          delBtn.addEventListener("click", function(e) {
            e.stopPropagation();
            if (!confirm("Delete this image?")) return;
            fetch("/api/images/" + encodeURIComponent(item.filename), { method: "DELETE" })
              .then(function(r) {
                if (r.ok) {
                  wrapper.remove();
                  if (!galleryGrid.querySelector(".gallery-item")) {
                    galleryGrid.appendChild(createGalleryEmpty("No images yet"));
                  }
                } else {
                  showToast("Failed to delete image");
                }
              })
              .catch(function() { showToast("Failed to delete image"); });
          });

          wrapper.appendChild(delBtn);
          wrapper.appendChild(el);
          galleryGrid.appendChild(wrapper);
        });
      })
      .catch(function() {
        galleryGrid.appendChild(createGalleryEmpty("Failed to load images"));
      });
  }

  function hideGallery() {
    galleryContainer.classList.remove("visible");
    chatContainer.classList.remove("hidden");
    footer.classList.remove("hidden");
  }

  galleryBack.addEventListener("click", hideGallery);

  // ── Lightbox ──
  function openLightbox(src) {
    lightboxImg.src = src;
    lightbox.classList.add("open");
  }

  function closeLightbox() {
    lightbox.classList.remove("open");
    lightboxImg.src = "";
  }

  lightboxClose.addEventListener("click", closeLightbox);
  lightbox.addEventListener("click", function(e) {
    if (e.target === lightbox) closeLightbox();
  });

  document.addEventListener("keydown", function(e) {
    if (e.key === "Escape") {
      if (lightbox.classList.contains("open")) closeLightbox();
      if (menuOverlay.classList.contains("open")) closeMenu();
    }
  });

  // ── Paste image support ──
  document.addEventListener("paste", function(e) {
    var items = e.clipboardData && e.clipboardData.items;
    if (!items) return;
    for (var i = 0; i < items.length; i++) {
      if (items[i].type.indexOf("image") !== -1) {
        e.preventDefault();
        var file = items[i].getAsFile();
        var reader = new FileReader();
        reader.onload = function(ev) {
          pendingImages.push(ev.target.result);
          updatePreviewStrip();
        };
        reader.readAsDataURL(file);
      }
    }
  });

  // ── Drag-and-drop image support ──
  chatContainer.addEventListener("dragover", function(e) {
    e.preventDefault();
    e.dataTransfer.dropEffect = "copy";
  });
  chatContainer.addEventListener("drop", function(e) {
    e.preventDefault();
    var files = e.dataTransfer.files;
    for (var i = 0; i < files.length; i++) {
      if (files[i].type.indexOf("image") !== -1) {
        (function(file) {
          var reader = new FileReader();
          reader.onload = function(ev) {
            pendingImages.push(ev.target.result);
            updatePreviewStrip();
          };
          reader.readAsDataURL(file);
        })(files[i]);
      }
    }
  });

  // ── Init ──
  connect();
  msgInput.focus();
})();
</script>
</body>
</html>
